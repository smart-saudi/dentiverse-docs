name: Feature Request
description: Suggest a new feature or improvement
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the app does this affect?
      options:
        - "Cases"
        - "Designers"
        - "Proposals"
        - "3D Viewer"
        - "Payments"
        - "Messages"
        - "Notifications"
        - "Dashboard"
        - "Settings"
        - "Landing Page"
        - "Admin"
        - "New Feature Area"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "Nice to have"
        - "Should have (improves UX significantly)"
        - "Must have (blocking user adoption)"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who is affected?
      placeholder: "As a [dentist/designer], I need [feature] because [reason]..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
      placeholder: "Add a filter for..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other solutions did you think of?
      placeholder: "Could also be solved by..."
